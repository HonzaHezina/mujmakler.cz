<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="shortcut icon" href="/favicon.svg">
<meta name="theme-color" content="#D91A1A">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://www.mujmakler.cz/kontakt.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <title>Kontakt – MujMakler.cz</title>
  <meta name="description" content="Kontakt na MujMakler.cz: telefon, email, sídlo, mapa a rychlý formulář.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="MujMakler.cz">
  <meta property="og:title" content="Kontakt – MujMakler.cz">
  <meta property="og:description" content="Kontakt na MujMakler.cz: telefon, email, sídlo, mapa a rychlý formulář.">
  <meta property="og:url" content="https://www.mujmakler.cz/kontakt.html">
  <meta property="og:image" content="https://www.mujmakler.cz/assets/img/og-image.jpg">
  <meta name="twitter:card" content="summary_large_image">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">

</head>
<body data-page="contact">
<div id="site-header"></div>
<script src="assets/js/layout.js"></script>

<main id="hlavni-obsah">
<section class="page-hero">
  <div class="container">
    <nav class="breadcrumb" aria-label="Navigace drobečků">
      <a href="index.html">Domů</a>
      <span class="sep" aria-hidden="true">/</span>
      <span aria-current="page">Kontakt</span>
    </nav>
    <div class="kicker">Kontakt</div>
    <h1 class="ph-title">Ozvěte se</h1>
    <p class="ph-subtitle">Jednoduše. Bez přehlcení. Napište nám, nebo rovnou zavolejte.</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="split">
      <div class="panel reveal">
        <h3 class="h3">Rychlý formulář</h3>
        <form data-form="contact" style="margin-top:12px">
          <div class="grid" style="grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px">
            <div class="form-field">
              <label for="k-name">Jméno</label>
              <input class="input" id="k-name" name="name" required placeholder="Jan Novák" autocomplete="name">
            </div>
            <div class="form-field">
              <label for="k-phone">Telefon</label>
              <input class="input" id="k-phone" name="phone" required placeholder="+420 xxx xxx xxx" type="tel" inputmode="tel" autocomplete="tel">
            </div>
          </div>
          <div class="grid" style="grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; margin-top:12px">
            <div class="form-field">
              <label for="k-email">E-mail</label>
              <input class="input" id="k-email" name="email" type="email" required placeholder="jan@example.cz" autocomplete="email">
            </div>
            <div class="form-field">
              <label for="k-topic">Téma</label>
              <select class="input" id="k-topic" name="topic">
                <option>Chci prodat</option>
                <option>Hledám nemovitost</option>
                <option>Rychlý odhad</option>
                <option>Jiné</option>
              </select>
            </div>
          </div>
          <div class="form-field" style="margin-top:12px">
            <label for="k-message">Zpráva</label>
            <textarea class="input" id="k-message" name="message" required placeholder="Stručně popište váš záměr..."></textarea>
          </div>
          <button class="btn btn-primary" type="submit" style="width:100%">Odeslat</button>
          <div class="small" style="margin-top:8px">Formulář odešleme přímo na petr.novak@mujmakler.cz. Odpovíme do 24 hodin.</div>
        </form>

        <div class="hr"></div>

        <div class="small" style="display:grid; gap:8px">
          <div><strong>Telefon:</strong> +420 123 456 789</div>
          <div><strong>Email:</strong> petr.novak@mujmakler.cz</div>
          <div><strong>Sídlo:</strong> Praha, Česká republika</div>
        </div>

        <div class="hr"></div>

        <div class=”footer-social” style=”margin-top:4px”>
          <a href=”#” aria-label=”Facebook MujMakler.cz” style=”color:var(--muted); transition:color var(--transition)”>
            <svg width=”22” height=”22” viewBox=”0 0 24 24” fill=”currentColor” aria-hidden=”true”><path d=”M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z”/></svg>
          </a>
          <a href=”#” aria-label=”LinkedIn MujMakler.cz” style=”color:var(--muted); transition:color var(--transition)”>
            <svg width=”22” height=”22” viewBox=”0 0 24 24” fill=”none” stroke=”currentColor” stroke-width=”2” stroke-linecap=”round” stroke-linejoin=”round” aria-hidden=”true”><path d=”M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z”/><rect x=”2” y=”9” width=”4” height=”12”/><circle cx=”4” cy=”4” r=”2”/></svg>
          </a>
          <a href=”#” aria-label=”Instagram MujMakler.cz” style=”color:var(--muted); transition:color var(--transition)”>
            <svg width=”22” height=”22” viewBox=”0 0 24 24” fill=”none” stroke=”currentColor” stroke-width=”2” stroke-linecap=”round” stroke-linejoin=”round” aria-hidden=”true”><rect x=”2” y=”2” width=”20” height=”20” rx=”5” ry=”5”/><path d=”M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z”/><line x1=”17.5” y1=”6.5” x2=”17.51” y2=”6.5”/></svg>
          </a>
        </div>
      </div>

      <div class=”panel reveal reveal-delay-1”>
        <h3 class=”h3”>Kde nás najdete</h3>
        <img src=”assets/img/map.png” alt=”Mapa Praha – MujMakler.cz” style=”border-radius:14px; border:1px solid var(--border); margin-top:12px” loading=”lazy”>
      </div>
    </div>
  </div>
</section>

</main>

<div id="site-footer"></div>

<script src="assets/js/site-data.js"></script>
<script src="assets/js/app.js"></script>

</body>
</html>
